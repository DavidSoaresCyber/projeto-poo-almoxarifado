<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Moranguinho Stock Manager</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="loading-screen" id="loading-screen"><div class="spinner"></div></div>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="navbar-container"></div>
      <div class="page-container">
        <div class="page-header"><h1>Produtos</h1><p>Cadastro e consulta de itens do almoxarifado</p></div>
        <div class="scanner-panel">
          <label for="barcode-input">Busca por código de barras</label>
          <input type="text" id="barcode-input" class="form-control" placeholder="Escaneie ou digite o código">
        </div>
        <div class="data-panel">
          <div class="data-toolbar">
            <input type="text" id="busca" class="form-control search" placeholder="Buscar nome, SKU ou código…">
            <div class="data-toolbar-actions">
              <button class="btn btn-primary btn-sm" onclick="abrirModalProduto()">Novo produto</button>
            </div>
          </div>
          <div class="table-scroll">
            <table>
              <thead><tr><th>Produto</th><th>SKU</th><th>Qtd</th><th>Preço</th><th>Validade</th><th>Status</th><th></th></tr></thead>
              <tbody id="produtos-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="components/navbar.js"></script>
  <script src="components/modal.js"></script>
  <script src="js/morangia.js"></script>
  <script src="js/produtos.js"></script>
</body>
</html>
