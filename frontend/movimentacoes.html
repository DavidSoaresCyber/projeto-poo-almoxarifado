<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimentações — Moranguinho</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="loading-screen" id="loading-screen"><div class="spinner"></div></div>
  <div class="app-layout">
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="navbar-container"></div>
      <div class="page-container">
        <div class="page-header">
          <div><h1>Movimentações</h1><p>Tudo que entrou e saiu do estoque</p></div>
          <button class="btn btn-secondary btn-sm" id="btn-export">Exportar CSV</button>
        </div>
        <div class="filter-row">
          <select id="filtro-tipo" class="form-control">
            <option value="">Todas as movimentações</option>
            <option value="entrada">Só entradas</option>
            <option value="saida">Só saídas</option>
          </select>
        </div>
        <div class="data-panel">
          <div class="table-scroll">
            <table>
              <thead><tr><th>Data</th><th>Tipo</th><th>Produto</th><th>Qtd</th><th>Responsável</th><th>Observação</th></tr></thead>
              <tbody id="mov-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="components/navbar.js"></script>
  <script src="js/movimentacoes.js"></script>
</body>
</html>
